<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — AutoML</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>  /* ── Design System ─────────────────────────────────────────────────────────
     Inter font, consistent tokens, refined components.
     Applied globally across all pages via inline <style> blocks.
  ── */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --brand:       #2563eb;
    --brand-dark:  #1d4ed8;
    --brand-light: #eff6ff;
    --success:     #16a34a;
    --warning:     #d97706;
    --danger:      #dc2626;
    --surface:     #ffffff;
    --surface-2:   #f8fafc;
    --border:      #e2e8f0;
    --text-1:      #0f172a;
    --text-2:      #475569;
    --text-3:      #94a3b8;
    --radius:      10px;
    --radius-lg:   14px;
    --shadow-sm:   0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow:      0 4px 16px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
    --shadow-lg:   0 10px 40px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.05);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--surface-2);
    color: var(--text-1);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Navbar ── */
  .ds-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .ds-nav-brand {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-1);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .ds-nav-brand span { color: var(--brand); }

  /* ── Cards ── */
  .ds-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .ds-card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .ds-card-header h2, .ds-card-header h3 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-1);
    margin: 0;
  }
  .ds-card-body { padding: 1.25rem; }

  /* ── Accent header (primary blue) ── */
  .ds-card-header-accent {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    border-bottom: none;
  }
  .ds-card-header-accent h2,
  .ds-card-header-accent h3,
  .ds-card-header-accent .ds-subtitle { color: #fff !important; }

  /* ── Stat boxes ── */
  .ds-stat {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    text-align: center;
  }
  .ds-stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--brand);
    line-height: 1.1;
  }
  .ds-stat-label {
    font-size: .75rem;
    color: var(--text-2);
    margin-top: .25rem;
    font-weight: 500;
  }
  .ds-stat.warn .ds-stat-value { color: var(--warning); }
  .ds-stat.success .ds-stat-value { color: var(--success); }

  /* ── Buttons ── */
  .ds-btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .5rem 1.1rem;
    font-size: .875rem; font-weight: 500;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
    line-height: 1.4;
  }
  .ds-btn-primary {
    background: var(--brand); color: #fff; border-color: var(--brand);
  }
  .ds-btn-primary:hover { background: var(--brand-dark); color: #fff; }
  .ds-btn-success  { background: var(--success); color: #fff; border-color: var(--success); }
  .ds-btn-success:hover  { background: #15803d; color: #fff; }
  .ds-btn-ghost    { background: transparent; color: var(--text-2); border-color: var(--border); }
  .ds-btn-ghost:hover    { background: var(--surface-2); }
  .ds-btn-sm { padding: .3rem .75rem; font-size: .8rem; }
  .ds-btn-lg { padding: .7rem 1.75rem; font-size: 1rem; }
  .ds-btn:disabled { opacity: .55; cursor: not-allowed; }

  /* ── Badges ── */
  .ds-badge {
    display: inline-flex; align-items: center;
    padding: .2rem .6rem;
    font-size: .72rem; font-weight: 600;
    border-radius: 20px;
    letter-spacing: .02em;
  }
  .ds-badge-success { background: #dcfce7; color: #15803d; }
  .ds-badge-blue    { background: #dbeafe; color: #1d4ed8; }
  .ds-badge-amber   { background: #fef3c7; color: #b45309; }
  .ds-badge-red     { background: #fee2e2; color: #b91c1c; }
  .ds-badge-gray    { background: #f1f5f9; color: #475569; }
  .ds-badge-purple  { background: #ede9fe; color: #6d28d9; }

  /* ── Tables ── */
  .ds-table { width: 100%; border-collapse: collapse; }
  .ds-table th {
    text-align: left;
    padding: .65rem 1rem;
    font-size: .78rem;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: .05em;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  .ds-table td {
    padding: .7rem 1rem;
    font-size: .875rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .ds-table tr:last-child td { border-bottom: none; }
  .ds-table tr:hover td { background: var(--brand-light); }
  .ds-table .best-row td { background: #f0fdf4; }

  /* ── Page hero ── */
  .ds-hero {
    background: linear-gradient(135deg, var(--brand) 0%, #1e3a8a 100%);
    color: #fff;
    padding: 2rem 0 1.75rem;
  }
  .ds-hero h1 { font-size: 1.7rem; font-weight: 700; margin: 0 0 .3rem; }
  .ds-hero p  { opacity: .8; margin: 0; font-size: .95rem; }

  /* ── Metric chips ── */
  .ds-metric { display: inline-block; padding: .2rem .7rem; border-radius: 6px; font-weight: 600; font-size: .85rem; }
  .ds-metric-green  { background: #dcfce7; color: #15803d; }
  .ds-metric-yellow { background: #fef3c7; color: #b45309; }
  .ds-metric-red    { background: #fee2e2; color: #b91c1c; }

  /* ── Section spacing ── */
  .ds-section { margin-bottom: 1.5rem; }

  .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
  .auth-card { width:100%; max-width:440px; }
  .auth-logo { width:48px; height:48px; background:var(--brand); border-radius:12px;
    display:flex; align-items:center; justify-content:center; font-size:1.4rem; margin:0 auto 1rem; }
  .form-control { border:1px solid var(--border); border-radius:8px; padding:.6rem .9rem; font-size:.9rem; }
  .form-control:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(37,99,235,.12); outline:none; }
  .form-label { font-size:.85rem; font-weight:600; color:var(--text-2); margin-bottom:.35rem; }
  .strength-bar { height:4px; border-radius:2px; background:var(--border); overflow:hidden; margin-top:5px; }
  .strength-fill { height:100%; border-radius:2px; transition:width .3s, background .3s; }
  </style>
</head><body>
<div class="auth-wrap">
  <div class="auth-card ds-card">
    <div class="ds-card-body" style="padding:2rem;">
      <div class="auth-logo">🤖</div>
      <h1 style="font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:.25rem;">Create account</h1>
      <p style="font-size:.85rem;color:var(--text-2);text-align:center;margin-bottom:1.5rem;">Save experiments and track your model history</p>

      {% if error %}<div class="alert alert-danger py-2 mb-3" style="font-size:.85rem;">{{ error }}</div>{% endif %}

      <form method="POST" id="regForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required minlength="3" maxlength="30" placeholder="3–30 characters">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" id="pw" class="form-control" required minlength="6" oninput="checkStrength(this.value)" placeholder="Min. 6 characters">
          <div class="strength-bar"><div class="strength-fill" id="sf" style="width:0%;background:var(--danger);"></div></div>
          <span id="slbl" style="font-size:.75rem;color:var(--text-3);">Enter a password</span>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirm" id="confirm" class="form-control" required placeholder="Repeat password">
          <div id="matchErr" style="display:none;font-size:.75rem;color:var(--danger);margin-top:.25rem;">Passwords do not match</div>
        </div>
        <button type="submit" class="ds-btn ds-btn-primary ds-btn-lg w-100" style="justify-content:center;">Create Account</button>
      </form>

      <div style="margin-top:1.25rem;text-align:center;font-size:.85rem;color:var(--text-2);">
        Already have an account? <a href="/login" style="color:var(--brand);font-weight:600;">Sign in</a>
      </div>
    </div>
  </div>
</div>
<script>
function checkStrength(pw) {
  var f=document.getElementById('sf'), l=document.getElementById('slbl');
  var w=0, c='var(--danger)', t='Too short';
  if(pw.length>=6){w=40;c='var(--warning)';t='Moderate';}
  if(pw.length>=10){w=70;c='var(--warning)';t='Good';}
  if(pw.length>=14){w=100;c='var(--success)';t='Strong';}
  f.style.width=w+'%'; f.style.background=c; l.textContent=t;
}
document.getElementById('regForm').addEventListener('submit',function(e){
  if(document.getElementById('pw').value !== document.getElementById('confirm').value){
    e.preventDefault();
    document.getElementById('matchErr').style.display='block';
  }
});
document.getElementById('confirm').addEventListener('input',function(){
  document.getElementById('matchErr').style.display='none';
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
