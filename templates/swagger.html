<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoML API Docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; background: #fafafa; }
    .topbar { display: none !important; }
    #swagger-header {
      background: linear-gradient(135deg,#1a73e8,#0d47a1);
      color:#fff; padding:1.2rem 2rem;
      display:flex; align-items:center; justify-content:space-between;
    }
    #swagger-header h1 { margin:0; font-size:1.4rem; font-weight:600; }
    #swagger-header a  { color:#fff; opacity:.85; font-size:.88rem; text-decoration:none; }
    #swagger-header a:hover { opacity:1; text-decoration:underline; }
    #swagger-ui .info .title { font-size:1.4rem !important; }
  </style>
</head>
<body>

<div id="swagger-header">
  <h1>🤖 AutoML REST API — v1</h1>
  <div class="d-flex gap-3">
    <a href="/">← Back to App</a>
    <a href="/api/v1/openapi.json" target="_blank">OpenAPI JSON ↗</a>
  </div>
</div>

<div id="swagger-ui"></div>

<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
<script>
  SwaggerUIBundle({
    url:          "/api/v1/openapi.json",
    dom_id:       "#swagger-ui",
    deepLinking:  true,
    presets:      [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
    layout:       "StandaloneLayout",
    tryItOutEnabled: true,
    requestInterceptor: function(req) {
      return req;
    }
  });
</script>
</body>
</html>
